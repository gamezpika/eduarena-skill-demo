<body>

<div class="demo-banner">技術 DEMO</div>

<div class="iphone-frame">
    <div class="iphone-island" aria-hidden="true"></div>
    <div class="iphone-home" aria-hidden="true"></div>

    <div class="iphone-screen">
        <div id="screen-hub">

            <!-- 頂部品牌 -->
            <div class="hub-brand">
                <div class="hub-logo">🎮</div>
                <div class="hub-title">EduArena 技術 Demo</div>
                <div class="hub-sub">看畫面感 · 純前端展示 · 4 種地圖技術</div>
            </div>

            <!-- 數據牆（純展示） -->
            <div class="hub-stats">
                <div class="hub-stat">
                    <div class="hub-stat-num">60+</div>
                    <div class="hub-stat-label">學員</div>
                </div>
                <div class="hub-stat">
                    <div class="hub-stat-num">17K</div>
                    <div class="hub-stat-label">題庫</div>
                </div>
                <div class="hub-stat">
                    <div class="hub-stat-num">5科</div>
                    <div class="hub-stat-label">6 年級</div>
                </div>
                <div class="hub-stat">
                    <div class="hub-stat-num">9位</div>
                    <div class="hub-stat-label">偉人</div>
                </div>
            </div>

            <!-- 4 大卡片 -->
            <div class="hub-cards">
                <a class="hub-card" data-theme="ocean" href="ocean.html">
                    <div class="hub-card-emoji">🌊</div>
                    <div class="hub-card-title">海洋地圖</div>
                    <div class="hub-card-desc">DOGTOR 風 3D 透視縮放、慣性視差、彈簧物理引擎</div>
                    <span class="hub-card-tag">3D 透視</span>
                </a>
                <a class="hub-card" data-theme="village" href="village.html">
                    <div class="hub-card-emoji">🏝</div>
                    <div class="hub-card-title">村莊地圖</div>
                    <div class="hub-card-desc">手繪 2.5D 大場景，10 個建築/科目島 hotspot</div>
                    <span class="hub-card-tag">2.5D 場景</span>
                </a>
                <a class="hub-card" data-theme="figures" href="figures.html">
                    <div class="hub-card-emoji">🏛</div>
                    <div class="hub-card-title">名人九宮格</div>

                    <span class="hub-card-tag">翻牌遊戲</span>
                </a>
                <a class="hub-card" data-theme="world" href="world.html">
                    <div class="hub-card-emoji">🗺</div>
                    <div class="hub-card-title">探索地圖</div>
                    <div class="hub-card-desc">可上下左右拖曳大世界，9 sprite 散佈 + 動畫</div>
                    <span class="hub-card-tag">可探索</span>
                </a>
            </div>

            <!-- 加 LINE Bot CTA -->
            <div class="hub-cta">
                <a class="hub-cta-btn" href="https://line.me/R/ti/p/%40eduarena_demo" target="_blank" rel="noopener">
                    <span class="hub-cta-emoji">💬</span>
                    <span>加 LINE Bot 看 demo</span>
                </a>
                <div class="hub-cta-hint">加為好友 → 自動收到 demo 連結</div>
            </div>

            <div class="hub-footer">
                © EduArena · 技術展示頁
