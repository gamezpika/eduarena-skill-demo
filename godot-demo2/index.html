<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#2a3e1f">
<title>探索 Demo — Phaser 版</title>
<style>
  html, body {
    margin: 0; padding: 0;
    background: #1a2412;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
    overscroll-behavior: none;
  }
  #game { width: 100vw; height: 100vh; }
  canvas { display: block; touch-action: none; }
  .hint {
    position: fixed; left: 12px; top: 12px;
    color: #fff; font-family: -apple-system, "PingFang TC", sans-serif; font-size: 14px;
    text-shadow: 0 1px 2px rgba(0,0,0,0.85);
    z-index: 10; pointer-events: none;
    padding: 6px 10px; border-radius: 6px;
    background: rgba(0,0,0,0.25);
  }
  /* 手機 touch device 不顯示 WASD hint（沒鍵盤）*/
  @media (pointer: coarse) {
    .hint { display: none; }
  }
</style>
</head>
<body>
<div class="hint">WASD / 方向鍵 或 左下搖桿 走動</div>
<div id="game"></div>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/phaser3-rex-plugins@1.1.84/dist/rexvirtualjoystickplugin.min.js"></script>
<script src="explore.js?v=24"></script>
</body>
</html>
