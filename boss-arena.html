<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1a0f08">
    <meta name="description" content="EduArena 技術 Demo — 瑪莉的鍊金工房風等距 2.5D 魔王戰場（答對攻擊、答錯扣血）">

    <meta property="og:title" content="EduArena 等距魔王戰 Demo">
    <meta property="og:description" content="瑪莉的鍊金工房風 — 答對攻擊魔王，答錯主角扣血">
    <meta property="og:type" content="website">

    <title>魔王戰 · EduArena Demo</title>
    <link rel="stylesheet" href="static/css/demo.css?v=3">
    <link rel="stylesheet" href="static/css/boss-arena.css?v=11">
</head>
<body>

<div class="demo-banner">技術 DEMO</div>

<div class="iphone-frame">
    <div class="iphone-island" aria-hidden="true"></div>
    <div class="iphone-home" aria-hidden="true"></div>

    <div class="iphone-screen">

        <div id="screen-arena">

            <button class="arena-back" onclick="location.href='index.html'" title="返回首頁">←</button>

            <!-- 上方主角 HUD（木框） -->
            <div class="arena-hud">
                <div class="hero-card">
                    <div class="hero-portrait">
                        <img src="assets/images/arena/hero.png" alt="hero">
                    </div>
                    <div class="hero-info">
                        <div class="hero-name">小派派</div>
                        <div class="hero-bars">
                            <div class="bar-row">
                                <span class="bar-label">HP</span>
                                <span class="bar-value" id="hero-hp-num">100 / 100</span>
                                <div class="bar-track"><div class="bar-fill hp" id="hero-hp-fill" style="width: 100%"></div></div>
                            </div>
                            <div class="bar-row">
                                <span class="bar-label">MP</span>
                                <span class="bar-value" id="hero-mp-num">50 / 50</span>
                                <div class="bar-track"><div class="bar-fill mp" id="hero-mp-fill" style="width: 100%"></div></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 戰場 -->
            <div class="arena-stage" id="arena-stage">
                <div class="torch-glow left"></div>
                <div class="torch-glow right"></div>

                <div class="boss-hud">
                    <div class="boss-name">★ 數學魔王 ★</div>
                    <div class="boss-hp-track"><div class="boss-hp-fill" id="boss-hp-fill" style="width: 100%"></div></div>
                </div>

                <!-- 武器切換列（派派 5/23 砍 fist + pencil 留 4） -->
                <div class="weapon-bar" id="weapon-bar">
                    <button class="weapon-btn" data-weapon="sword"    title="短劍">⚔️</button>
                    <button class="weapon-btn" data-weapon="book"     title="魔法書">📕</button>
                    <button class="weapon-btn" data-weapon="staff"    title="法杖">🪄</button>
                    <button class="weapon-btn" data-weapon="gauntlet" title="拳套">🥊</button>
                </div>

                <!-- 5 個隱形錨點（不顯示視覺，只當位置邏輯） -->
                <div class="grid-cell" data-col="0"></div>
                <div class="grid-cell" data-col="1"></div>
                <div class="grid-cell" data-col="2"></div>
                <div class="grid-cell" data-col="3"></div>
                <div class="grid-cell" data-col="4"></div>

                <img src="assets/images/arena/hero_iso.png?v=2" class="fighter-hero" id="fighter-hero" data-col="3" alt="hero">
                <img src="assets/images/arena/boss_iso.png?v=2" class="fighter-boss" id="fighter-boss" alt="boss">

                <!-- 左下：科目固定資訊 -->
                <div class="info-panel info-subject">
                    <div class="panel-title">📘 數學</div>
                    <div class="panel-sub">五年級 · G5</div>
                </div>

                <!-- 右下：戰況動態 -->
                <div class="info-panel info-status" id="combat-status">
                    <div class="status-line" id="status-line">📍 接近中</div>
                    <div class="status-detail" id="status-detail">距離魔王 3 格</div>
                </div>
            </div>

            <!-- 題目卡 -->
            <div class="arena-question" id="arena-question">準備迎戰...</div>

            <!-- 4 選項 -->
            <div class="arena-options" id="arena-options">
                <button class="opt-btn" data-i="0">--</button>
                <button class="opt-btn" data-i="1">--</button>
                <button class="opt-btn" data-i="2">--</button>
                <button class="opt-btn" data-i="3">--</button>
            </div>

        </div>

    </div>
</div>

<script>
// 假題庫（demo 用，數學 5 題）
const QUESTIONS = [
    { q: "12 × 8 = ?",   options: ["88", "96", "86", "100"], ans: 1 },
    { q: "25 + 37 = ?",  options: ["52", "72", "62", "68"],  ans: 2 },
    { q: "81 ÷ 9 = ?",   options: ["7",  "8",  "9",  "11"],  ans: 2 },
    { q: "100 - 47 = ?", options: ["53", "63", "43", "57"],  ans: 0 },
    { q: "7 × 9 = ?",    options: ["56", "72", "63", "65"],  ans: 2 },
];

/* P0 Grid Data Structure（單列預留 2D，未來可擴 grid[x][y]）
   現在 demo 只用 GRID.cols × GRID.rows = 5 × 1，hero 在 grid[heroCol][0]
   未來若要多角色站位，把 heroCol 換成 heroPos:{x,y} 即可 */
const GRID = { cols: 5, rows: 1 };
const IN_RANGE = 3;   // col 3 進入攻擊範圍可打魔王，col 4 是魔王

const state = {
    heroHP: 100, heroMaxHP: 100,
    heroMP: 50,  heroMaxMP: 50,
    bossHP: 250, bossMaxHP: 250,
    heroCol: 3,            // 主角起始在攻擊範圍（離魔王 1 格）— 派派 5/23 指示
    combo: 0,              // D. 連擊計數
    qIdx: 0,
    busy: false,
    finished: false,
};

const $ = (id) => document.getElementById(id);
const stage = $("arena-stage");
const hero  = $("fighter-hero");
const boss  = $("fighter-boss");

function updateBars() {
    $("hero-hp-num").textContent = `${state.heroHP} / ${state.heroMaxHP}`;
    $("hero-hp-fill").style.width = (state.heroHP / state.heroMaxHP * 100) + "%";
    $("hero-mp-num").textContent = `${state.heroMP} / ${state.heroMaxMP}`;
    $("hero-mp-fill").style.width = (state.heroMP / state.heroMaxMP * 100) + "%";
    $("boss-hp-fill").style.width = (state.bossHP / state.bossMaxHP * 100) + "%";
}

function updateGridHighlight() {
    // 派派 5/23 指示：移動格不用顯示
    // 只更新 hero 的 data-col 觸發 CSS 位置 + z-index 變更（P3 Y-sort 由 CSS 自動套）
    hero.dataset.col = state.heroCol;

    // 右下戰況面板同步更新
    const statusPanel = $("combat-status");
    const statusLine  = $("status-line");
    const statusDetail = $("status-detail");
    const distance = IN_RANGE - state.heroCol;  // 距離魔王還剩幾格

    if (state.heroCol >= IN_RANGE) {
        // 進入攻擊範圍
        statusPanel.classList.add("in-range");
        statusLine.innerHTML = "⚔ 攻擊範圍！";
        statusDetail.innerHTML = "下一題答對 = 攻擊";
    } else {
        statusPanel.classList.remove("in-range");
        statusLine.innerHTML = "📍 接近中";
        statusDetail.innerHTML = `距離魔王 ${distance} 格`;
    }
}

function loadQuestion() {
    const q = QUESTIONS[state.qIdx % QUESTIONS.length];
    $("arena-question").textContent = q.q;
    const btns = document.querySelectorAll(".opt-btn");
    btns.forEach((btn, i) => {
        btn.textContent = "ABCD"[i] + ". " + q.options[i];
        btn.className = "opt-btn";
        btn.disabled = false;
        btn.onclick = () => handleAnswer(i, btn);
    });
}

function popDamage(targetEl, text, miss) {
    const rect = targetEl.getBoundingClientRect();
    const stageRect = stage.getBoundingClientRect();
    const pop = document.createElement("div");
    pop.className = "dmg-pop" + (miss ? " miss" : "");
    pop.textContent = text;
    pop.style.left = (rect.left - stageRect.left + rect.width / 2) + "px";
    pop.style.top  = (rect.top  - stageRect.top  + 10) + "px";
    stage.appendChild(pop);
    setTimeout(() => pop.remove(), 1000);
}

async function handleAnswer(idx, btn) {
    if (state.busy || state.finished) return;
    state.busy = true;
    const q = QUESTIONS[state.qIdx % QUESTIONS.length];
    document.querySelectorAll(".opt-btn").forEach(b => b.disabled = true);

    if (idx === q.ans) {
        btn.classList.add("correct");
        state.combo++;
        showComboIfDue();
        if (state.heroCol < IN_RANGE) {
            await moveForward();
        } else {
            await attackBoss();
        }
    } else {
        btn.classList.add("wrong");
        document.querySelectorAll(".opt-btn")[q.ans].classList.add("correct");
        state.combo = 0;  // 答錯重置連擊
        await getHitByBoss();
    }

    if (state.bossHP <= 0)             return endGame("win");
    if (state.heroHP <= 0)             return endGame("dead");
    if (state.heroCol < 0)             return endGame("retreat");

    await sleep(700);
    state.qIdx++;
    state.busy = false;
    loadQuestion();
}

// D. Combo 大字提示
function showComboIfDue() {
    let text, tier;
    if (state.combo === 3)       { text = "COMBO ×3!"; tier = "tier-1"; }
    else if (state.combo === 5)  { text = "COMBO ×5!!"; tier = "tier-2"; }
    else if (state.combo === 10) { text = "COMBO ×10!!!"; tier = "tier-3"; }
    else if (state.combo > 10 && state.combo % 5 === 0) { text = `COMBO ×${state.combo}!!!`; tier = "tier-3"; }
    else return;
    const pop = document.createElement("div");
    pop.className = "combo-pop " + tier;
    pop.textContent = text;
    stage.appendChild(pop);
    setTimeout(() => pop.remove(), 1200);
}

// D. 連擊傷害倍率
function getComboMultiplier() {
    if (state.combo >= 10) return 3.0;
    if (state.combo >= 5)  return 2.0;
    if (state.combo >= 3)  return 1.5;
    return 1.0;
}

// C. 命中閃光 + 6 粒子（在 target sprite 中心放）
function spawnHitFX(targetEl, weaponKey) {
    const rect = targetEl.getBoundingClientRect();
    const stageRect = stage.getBoundingClientRect();
    const cx = rect.left - stageRect.left + rect.width / 2;
    const cy = rect.top  - stageRect.top  + rect.height / 2;

    // 中央閃光（武器專屬色彩 / 形狀）
    const flash = document.createElement("div");
    flash.className = "hit-flash" + (weaponKey ? ` weapon-${weaponKey}` : "");
    flash.style.left = cx + "px";
    flash.style.top  = cy + "px";
    stage.appendChild(flash);
    setTimeout(() => flash.remove(), 700);

    // 6 粒子四散
    for (let i = 0; i < 6; i++) {
        const angle = (i / 6) * Math.PI * 2 + Math.random() * 0.3;
        const dist = 50 + Math.random() * 30;
        const midDist = dist * 0.5;
        const p = document.createElement("div");
        p.className = "hit-particle";
        p.style.left = cx + "px";
        p.style.top  = cy + "px";
        p.style.setProperty("--px", Math.cos(angle) * dist + "px");
        p.style.setProperty("--py", Math.sin(angle) * dist + "px");
        p.style.setProperty("--px-mid", Math.cos(angle) * midDist + "px");
        p.style.setProperty("--py-mid", Math.sin(angle) * midDist + "px");
        stage.appendChild(p);
        setTimeout(() => p.remove(), 850);
    }
}

async function moveForward() {
    state.heroCol = Math.min(IN_RANGE, state.heroCol + 1);
    showToast("⬆ 前進！" + (state.heroCol === IN_RANGE ? " 進入攻擊範圍！" : ""));
    updateGridHighlight();
    await sleep(550);  // 等 CSS transition
}

async function moveBackward() {
    state.heroCol -= 1;  // 可能變 -1（觸發 retreat fail）
    if (state.heroCol >= 0) {
        showToast("⬇ 被打退...");
        updateGridHighlight();
    }
    await sleep(550);
}

async function attackBoss() {
    const mult = getComboMultiplier();
    const baseDmg = 40 + Math.floor(Math.random() * 30);  // 40-69
    const dmg = Math.floor(baseDmg * mult);
    state.bossHP = Math.max(0, state.bossHP - dmg);

    // B. 武器專屬攻擊動畫（依當前武器套對應 keyframes）
    const attackClass = `attacking-${state.weapon}`;
    hero.classList.add(attackClass);
    const attackDur = state.weapon === "pencil" ? 500 : (state.weapon === "staff" ? 750 : 700);
    setTimeout(() => hero.classList.remove(attackClass), attackDur);

    // 武器專屬軌跡（從主角往魔王劃過去）
    spawnWeaponTrail();

    // 衝刺中段（接觸時）觸發特效
    await sleep(state.weapon === "pencil" ? 220 : 320);
    boss.classList.add("hit");
    popDamage(boss, "-" + dmg, false);
    spawnHitFX(boss, state.weapon);            // 武器專屬命中閃光 + 粒子
    stage.classList.add("impact");             // F. 鏡頭衝擊
    setTimeout(() => stage.classList.remove("impact"), 500);
    if (navigator.vibrate) navigator.vibrate(40);
    updateBars();

    await sleep(400);
    boss.classList.remove("hit");
}

// 武器軌跡：從 hero 中心 → boss 中心劃過去
function spawnWeaponTrail() {
    if (state.weapon === "fist") return;  // 拳頭不畫軌跡
    const heroRect = hero.getBoundingClientRect();
    const bossRect = boss.getBoundingClientRect();
    const stageRect = stage.getBoundingClientRect();
    const hx = heroRect.left - stageRect.left + heroRect.width / 2;
    const hy = heroRect.top  - stageRect.top  + heroRect.height * 0.45;
    const bx = bossRect.left - stageRect.left + bossRect.width / 2;
    const by = bossRect.top  - stageRect.top  + bossRect.height * 0.55;
    const midX = (hx + bx) / 2;
    const midY = (hy + by) / 2;

    const trail = document.createElement("div");
    trail.className = `weapon-trail trail-${state.weapon}`;

    if (state.weapon === "sword" || state.weapon === "pencil") {
        // 直/弧線：從 hero 拉到 boss
        const dx = bx - hx, dy = by - hy;
        const angle = Math.atan2(dy, dx) * 180 / Math.PI;
        const len = Math.sqrt(dx*dx + dy*dy);
        trail.style.left = hx + "px";
        trail.style.top  = hy + "px";
        trail.style.width = len + "px";
        trail.style.transform = `rotate(${angle}deg)`;
    } else {
        // 圓波：放魔王中心
        trail.style.left = bx + "px";
        trail.style.top  = by + "px";
        trail.style.transform = "translate(-50%, -50%)";
    }
    stage.appendChild(trail);
    setTimeout(() => trail.remove(), 700);
}

async function getHitByBoss() {
    const dmg = 18 + Math.floor(Math.random() * 12);  // 18-29
    state.heroHP = Math.max(0, state.heroHP - dmg);
    hero.classList.add("hit");
    stage.classList.add("shake", "player-hit");
    popDamage(hero, "-" + dmg, true);
    if (navigator.vibrate) navigator.vibrate(30);
    updateBars();
    await sleep(500);
    hero.classList.remove("hit");
    stage.classList.remove("shake", "player-hit");
    // 答錯後退 1 格
    await moveBackward();
}

function showToast(text) {
    const t = document.createElement("div");
    t.className = "arena-toast";
    t.textContent = text;
    stage.appendChild(t);
    setTimeout(() => t.remove(), 1200);
}

function endGame(outcome) {
    state.finished = true;
    let emoji, title, titleClass, sub;
    let overlayDelay = 600;

    if (outcome === "win") {
        // H. 勝利 cinematic（拿掉光柱、拿掉 combo 顯示）
        boss.classList.add("defeated");
        stage.classList.add("slow-mo");
        // 主角擺勝利姿勢
        hero.classList.remove("attacking");
        hero.classList.add("victory");
        emoji = "🎉"; title = "勝利！"; titleClass = "";
        sub = `擊敗魔王！剩餘 HP：${state.heroHP} · 答對 ${state.qIdx + 1} 題`;
        overlayDelay = 2200;
    } else if (outcome === "retreat") {
        // H. 失敗 cinematic
        const vig = document.createElement("div");
        vig.className = "lose-vignette";
        stage.appendChild(vig);
        emoji = "🏳"; title = "撤退失敗..."; titleClass = "lose";
        sub = "被打出戰場！魔王還剩 HP " + state.bossHP;
        overlayDelay = 1200;
    } else {
        // H. 失敗 cinematic
        const vig = document.createElement("div");
        vig.className = "lose-vignette";
        stage.appendChild(vig);
        emoji = "💀"; title = "失敗..."; titleClass = "lose";
        sub = "魔王還剩 HP " + state.bossHP;
        overlayDelay = 1200;
    }
    setTimeout(() => {
        const overlay = document.createElement("div");
        overlay.className = "arena-overlay";
        overlay.innerHTML =
            `<div class="overlay-emoji">${emoji}</div>
             <div class="overlay-title ${titleClass}">${title}</div>
             <div class="overlay-sub">${sub}</div>
             <button class="overlay-btn" onclick="location.reload()">再戰一次</button>`;
        stage.appendChild(overlay);
    }, overlayDelay);
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// 武器切換（派派 5/23 砍 fist + pencil 留 4：sword/book/staff/gauntlet）
const WEAPON_SRC = {
    sword:    "assets/images/arena/hero_iso_sword.png?v=1",
    book:     "assets/images/arena/hero_iso_book.png?v=1",
    staff:    "assets/images/arena/hero_iso_staff.png?v=1",
    gauntlet: "assets/images/arena/hero_iso_gauntlet.png?v=1",
};
state.weapon = "sword";  // 預設拿劍

function switchWeapon(key) {
    if (!WEAPON_SRC[key]) return;
    state.weapon = key;
    hero.src = WEAPON_SRC[key];
    document.querySelectorAll(".weapon-btn").forEach(b => {
        b.classList.toggle("active", b.dataset.weapon === key);
    });
}
document.querySelectorAll(".weapon-btn").forEach(b => {
    b.onclick = () => switchWeapon(b.dataset.weapon);
});
switchWeapon(state.weapon);  // 初始套用

// 開場
updateBars();
updateGridHighlight();

// A. 開場進場動畫（主角滑入）
hero.classList.add("entering");
setTimeout(() => hero.classList.remove("entering"), 1100);

// 第一題延後 1 秒讓進場動畫跑完才接題目（避免玩家在動畫期間點選項）
state.busy = true;
loadQuestion();
setTimeout(() => { state.busy = false; }, 1100);
</script>

</body>
</html>
