<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#87ceeb">
    <meta property="og:title" content="中世紀村莊 3D — EduArena Demo">
    <meta property="og:description" content="Three.js + Quaternius Medieval Village MegaKit 模組化拼裝中世紀寫實村莊">
    <meta property="og:type" content="website">
    <meta name="description" content="EduArena 中世紀村莊 3D — Three.js + MegaKit 寫實風 7 棟程式拼成 + props 散佈">
    <title>中世紀村莊 3D — EduArena Demo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #87ceeb; font-family: -apple-system, "PingFang TC", sans-serif; }
        #scene-canvas { display: block; width: 100%; height: 100%; }
        .demo-banner {
            position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); color: #fff; padding: 5px 12px;
            border-radius: 999px; font-size: 12px; font-weight: 700; z-index: 100;
            pointer-events: none;
        }
        .controls-hint {
            position: fixed; top: 50px; left: 10px; right: 10px;
            background: rgba(0,0,0,0.55); color: #fff; padding: 8px 12px;
            border-radius: 8px; font-size: 13px; text-align: center; z-index: 100;
            pointer-events: none; animation: hintFade 4s ease-out forwards;
        }
        @keyframes hintFade {
            0% { opacity: 0; }
            10%, 70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
        .joystick {
            position: fixed; bottom: 30px; left: 30px;
            width: 120px; height: 120px;
            background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.4);
            border-radius: 50%; z-index: 50; touch-action: none;
        }
        .joystick-knob {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 50px; height: 50px; background: rgba(255,255,255,0.8);
            border-radius: 50%; pointer-events: none;
            transition: background 0.1s;
        }
        .joystick.active .joystick-knob { background: rgba(255,200,100,1); }
        .demo-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7);
            display: none; align-items: center; justify-content: center; z-index: 200;
            padding: 20px; pointer-events: auto;
        }
        .demo-modal.show { display: flex; }
        .demo-modal-card {
            background: linear-gradient(180deg, #fff, #f8f0e0);
            border-radius: 20px; padding: 30px; max-width: 350px; width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            text-align: center; transform: scale(0.7); transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .demo-modal.show .demo-modal-card { transform: scale(1); }
        .demo-modal-icon { font-size: 60px; margin-bottom: 10px; }
        .demo-modal-title { font-size: 22px; font-weight: 700; color: #5a3a2a; margin-bottom: 10px; }
        .demo-modal-body { font-size: 15px; color: #6a5a4a; line-height: 1.6; }
        .demo-modal-close {
            margin-top: 20px; padding: 10px 30px;
            background: linear-gradient(135deg, #ff9a3c, #ff7a1c); color: #fff;
            border: none; border-radius: 999px; font-size: 15px; font-weight: 700;
            cursor: pointer; box-shadow: 0 4px 12px rgba(255,154,60,0.4);
        }
        .loading-screen {
            position: fixed; inset: 0; background: linear-gradient(180deg, #4a90e2, #ffd9a8);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: #fff; font-size: 16px; font-weight: 700; z-index: 999;
            transition: opacity 0.5s;
        }
        .loading-screen.hide { opacity: 0; pointer-events: none; }
        .loading-bar {
            width: 200px; height: 6px; background: rgba(255,255,255,0.3);
            border-radius: 3px; overflow: hidden; margin-top: 12px;
        }
        .loading-bar i {
            display: block; height: 100%; width: 0%;
            background: linear-gradient(90deg, #fdc500, #ff9a3c);
            transition: width 0.3s;
        }
    </style>

    <!-- ES Module importmap for Three.js + addons (post-processing, GLTFLoader) -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>

<canvas id="scene-canvas"></canvas>

<div class="loading-screen" id="loading-screen">
    <div>🌍 載入 3D 世界中…</div>
    <div class="loading-bar"><i id="loading-bar-fill"></i></div>
</div>

<div class="demo-banner">中世紀村莊 3D · MegaKit 模組拼裝</div>
<div class="controls-hint">📱 拖左下搖桿移動 · 點建築開介紹 · 鍵盤 ↑↓←→ 或 WASD</div>

<div class="joystick" id="joystick">
    <div class="joystick-knob" id="joystick-knob"></div>
</div>

<div class="demo-modal" id="demo-modal">
    <div class="demo-modal-card">
        <div class="demo-modal-icon" id="demo-modal-icon">🏪</div>
        <div class="demo-modal-title" id="demo-modal-title">商店</div>
        <div class="demo-modal-body" id="demo-modal-body">內容</div>
        <button class="demo-modal-close" id="demo-modal-close">關閉</button>
    </div>
</div>

<script type="module" src="static/js/medieval-world.js?v=2"></script>

</body>
</html>
