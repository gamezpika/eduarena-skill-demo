<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
    <title>Sprite 動畫驗證 — Codex i2i 16 幀 walk cycle</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; min-height: 100vh;
            background: linear-gradient(180deg, #b8e3ff 0%, #ffd9a8 60%, #c8d96f 100%);
            font-family: -apple-system, "PingFang TC", sans-serif;
            overflow: hidden;
            -webkit-user-select: none; user-select: none;
        }
        .wrap {
            position: fixed; inset: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 24px;
        }
        h1 {
            color: #2c3e50; font-size: 22px; font-weight: 800;
            text-shadow: 0 2px 0 rgba(255,255,255,0.6);
            text-align: center;
        }
        .subtitle {
            color: #5a6a7a; font-size: 13px; max-width: 320px; text-align: center;
            line-height: 1.5;
        }
        /* sprite sheet 512x512, 每格 128x128, 4 cols x 4 rows
           row 0 = south, 1 = north, 2 = east, 3 = west
           col 0 = stand, 1 = step1, 2 = stand2, 3 = step2 */
        .stage {
            width: 256px; height: 256px;
            background: rgba(255,255,255,0.35);
            border-radius: 24px;
            border: 3px solid rgba(255,255,255,0.6);
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }
        .sprite {
            width: 256px; height: 256px;  /* 2× scale 128 → 256 */
            background-image: url(assets/images/sprites/student_walk_sheet_white4.png?v=4);
            background-size: 1024px 1024px;  /* 整 sheet 4× scale = 512×4 = 2048? */
            background-repeat: no-repeat;
            image-rendering: pixelated;  /* 保留 sprite 清晰邊緣 */
            background-position: 0 0;
        }
        /* 改用 sprite sheet 原 512×512，css scale 2× → display 256×256 per cell */
        .sprite-real {
            width: 128px; height: 128px;
            background-image: url(assets/images/sprites/student_walk_sheet_white4.png?v=4);
            background-size: 512px 512px;
            background-repeat: no-repeat;
            image-rendering: -webkit-optimize-contrast;
            transform: scale(2);
            transform-origin: center center;
        }
        /* 4 方向 row 偏移：south=0, north=128, east=256, west=384 */
        .sprite-real[data-dir="south"] { background-position-y:    0px; }
        .sprite-real[data-dir="north"] { background-position-y: -128px; }
        .sprite-real[data-dir="east"]  { background-position-y: -256px; }
        .sprite-real[data-dir="west"]  { background-position-y: -384px; }
        /* CSS 4 幀 walk cycle - 用 steps() 切幀，0%→0px / 25%→-128 / 50%→-256 / 75%→-384 */
        @keyframes walk4 {
            0%   { background-position-x:    0px; }
            25%  { background-position-x: -128px; }
            50%  { background-position-x: -256px; }
            75%  { background-position-x: -384px; }
            100% { background-position-x:    0px; }
        }
        .sprite-real.walking { animation: walk4 0.6s steps(4) infinite; }

        .controls {
            display: flex; flex-direction: column; align-items: center; gap: 14px;
        }
        .dir-pad {
            display: grid;
            grid-template-columns: 60px 60px 60px;
            grid-template-rows: 60px 60px 60px;
            gap: 6px;
        }
        .dir-pad button {
            background: rgba(255,255,255,0.7);
            border: 2px solid rgba(0,0,0,0.15);
            border-radius: 12px;
            font-size: 24px; font-weight: 700; color: #2c3e50;
            cursor: pointer;
            transition: all 0.1s;
            -webkit-tap-highlight-color: transparent;
        }
        .dir-pad button:hover, .dir-pad button.active {
            background: #fdc500;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .dir-pad button:disabled { visibility: hidden; }
        .toggle-walk {
            padding: 12px 28px;
            background: linear-gradient(135deg, #ff9a3c, #ff7a1c);
            color: #fff; border: none; border-radius: 999px;
            font-size: 15px; font-weight: 700;
            box-shadow: 0 4px 12px rgba(255,154,60,0.4);
            cursor: pointer;
        }
        .info {
            position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); color: #fff;
            padding: 6px 16px; border-radius: 999px;
            font-size: 11px; font-weight: 700;
            white-space: nowrap;
        }
        .back-link {
            position: fixed; top: 12px; left: 12px;
            background: rgba(0,0,0,0.55); color: #fff;
            padding: 6px 12px; border-radius: 999px;
            font-size: 12px; text-decoration: none;
        }
    </style>
</head>
<body>

<a class="back-link" href="/">← 回首頁</a>

<div class="wrap">
    <h1>🎨 Codex i2i sprite 動畫驗證</h1>
    <div class="subtitle">
        Gemini 2.5-flash-image i2i + PIL palette quantize<br>
        4 方向 × 4 幀 = 16 幀，base 色票強制統一
    </div>

    <div class="stage">
        <div class="sprite-real walking" id="sprite" data-dir="south"></div>
    </div>

    <div class="controls">
        <div class="dir-pad">
            <button disabled></button>
            <button data-dir="north">↑</button>
            <button disabled></button>
            <button data-dir="west">←</button>
            <button class="toggle-walk" id="toggleBtn" style="grid-area: 2/2; padding: 0; font-size: 14px;">走/停</button>
            <button data-dir="east">→</button>
            <button disabled></button>
            <button data-dir="south">↓</button>
            <button disabled></button>
        </div>
    </div>
</div>

<div class="info">⌨ 鍵盤 ↑↓←→ 切方向 / 空白鍵切走/停</div>

<script>
const sprite = document.getElementById('sprite');
const buttons = document.querySelectorAll('.dir-pad button[data-dir]');
const toggleBtn = document.getElementById('toggleBtn');

function setDir(dir) {
    sprite.dataset.dir = dir;
    buttons.forEach(b => b.classList.toggle('active', b.dataset.dir === dir));
}

buttons.forEach(b => b.addEventListener('click', () => setDir(b.dataset.dir)));

let walking = true;
function toggleWalk() {
    walking = !walking;
    sprite.classList.toggle('walking', walking);
}
toggleBtn.addEventListener('click', toggleWalk);

document.addEventListener('keydown', e => {
    if (e.key === 'ArrowUp')    setDir('north');
    else if (e.key === 'ArrowDown')  setDir('south');
    else if (e.key === 'ArrowLeft')  setDir('west');
    else if (e.key === 'ArrowRight') setDir('east');
    else if (e.key === ' ') { e.preventDefault(); toggleWalk(); }
});
</script>

</body>
</html>
