<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1a6b9c">
    <!-- OG meta -->
    <meta property="og:title" content="探索地圖 — EduArena Demo">
    <meta property="og:description" content="EduArena 技術展示">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://eduarena-skill-demo-production.up.railway.app/assets/images/world_bg.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="description" content="EduArena 探索地圖技術 Demo — 大背景可上下滑動的探索感地圖。">
    <title>EduArena 探索地圖 Demo</title>
    <link rel="stylesheet" href="static/css/demo.css?v=3">
    <link rel="stylesheet" href="static/css/world.css?v=27">

    <!-- Three.js (給 chibi 小學生 canvas) -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    <style>
        .wd-chibi-canvas {
            position: absolute; inset: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 30;
        }
        /* polygon SVG overlay — 跟 mapImg 同 DOM 層，100% 1:1 對齊 */
        .wd-polygon-svg {
            position: absolute; inset: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 25;
        }
        .wd-joystick {
            position: absolute; bottom: 16px; left: 16px;
            width: 100px; height: 100px;
            background: rgba(255,255,255,0.18);
            border: 2px solid rgba(255,255,255,0.45);
            border-radius: 50%; z-index: 50; touch-action: none;
        }
        .wd-joystick-knob {
            position: absolute; top: 50%; left: 50%;
            width: 44px; height: 44px;
            background: rgba(255,255,255,0.85);
            border-radius: 50%; transform: translate(-50%, -50%);
            pointer-events: none; transition: background 0.1s;
        }
        .wd-joystick.active .wd-joystick-knob { background: rgba(255,200,100,1); }
    </style>
</head>
<body>

<div class="demo-banner">技術 DEMO</div>

<div class="iphone-frame">
    <div class="iphone-island" aria-hidden="true"></div>
    <div class="iphone-home" aria-hidden="true"></div>

    <div class="iphone-screen">
        <div id="screen-world">

            <!-- ── 上：場景名 + 任務進度 ──────── -->
            <div class="wd-top">
                <div class="wd-scene">
                    <div class="wd-scene-name">起 始 之 地</div>
                    <div class="wd-scene-progress">已開採 0 / 1</div>
                </div>
            </div>

            <!-- ── 左側：玩家頭像 + 狀態 ────── -->
            <div class="wd-left">
                <div class="wd-player-card">
                    <div class="wd-avatar">🧙</div>
                    <div>
                        <div class="wd-player-name">派派 Lv 42</div>
                        <div class="wd-player-bar"><i></i></div>
                    </div>
                </div>
                <div class="wd-status-card">
                    <div class="wd-status-label">工作排程</div>
                    <div class="wd-status-value">休息中…</div>
                </div>
            </div>

            <!-- ── 右上：資源欄 ─────────────── -->
            <div class="wd-right">
                <div class="wd-res">
                    <span class="wd-res-icon coin">🍯</span>
                    <span>1.5M</span>
                </div>
                <div class="wd-res">
                    <span class="wd-res-icon gem">💎</span>
                    <span>238</span>
                </div>
            </div>

            <!-- ── 主場景：大背景可上下滑動 + sprite hotspot ──── -->
            <div class="wd-viewport" id="wd-viewport">
                <div class="wd-world" id="wd-world">
                    <!-- 12 個透明 hotspot button（地圖背景 world_map_v3.png 已含建築畫） -->
                    <!-- 頂部 3 個漂浮島（緊貼天花板）-->
                    <button class="wd-sprite" data-tap="chinese" style="top:0%;  left:0%;  width:30%; height:24%;" aria-label="國語島"></button>
                    <button class="wd-sprite" data-tap="boss"    style="top:0%;  left:36%; width:26%; height:28%;" aria-label="魔王塔"></button>
                    <button class="wd-sprite" data-tap="english" style="top:0%;  left:62%; width:38%; height:25%;" aria-label="英文島"></button>
                    <!-- 中段主陸 6 個建築 -->
                    <button class="wd-sprite" data-tap="shop"    style="top:30%; left:2%;  width:28%; height:18%;" aria-label="商店"></button>
                    <button class="wd-sprite" data-tap="exam"    style="top:26%; left:32%; width:34%; height:22%;" aria-label="考試中心"></button>
                    <button class="wd-sprite" data-tap="museum"  style="top:30%; left:66%; width:30%; height:18%;" aria-label="偉人館"></button>
                    <button class="wd-sprite" data-tap="pvp"     style="top:48%; left:2%;  width:24%; height:14%;" aria-label="PK 競技場"></button>
                    <button class="wd-sprite" data-tap="farm"    style="top:48%; left:30%; width:32%; height:14%;" aria-label="農田"></button>
                    <button class="wd-sprite" data-tap="quest"   style="top:48%; left:62%; width:30%; height:14%;" aria-label="任務告示板"></button>
                    <!-- 下方 3 個漂浮島 -->
                    <button class="wd-sprite" data-tap="math"    style="top:72%; left:0%;  width:28%; height:22%;" aria-label="數學島"></button>
                    <button class="wd-sprite" data-tap="social"  style="top:72%; left:28%; width:38%; height:24%;" aria-label="社會島"></button>
                    <button class="wd-sprite" data-tap="science" style="top:72%; left:66%; width:34%; height:22%;" aria-label="自然島"></button>

                    <!-- Polygon SVG overlay (跟 mapImg 同 DOM 層完美對齊) -->
                    <svg class="wd-polygon-svg" id="wd-polygon-svg" preserveAspectRatio="none" viewBox="0 0 1 1"></svg>
                    <!-- Three.js chibi 學生 canvas (跟著 .wd-world transform) -->
                    <canvas class="wd-chibi-canvas" id="wd-chibi-canvas"></canvas>
                </div>
                <!-- 晝夜變化 overlay（60 秒一循環：晨→日→晚→夜） -->
                <div class="wd-daynight" aria-hidden="true"></div>

                <div class="wd-hint">↕ ↔ 拖曳地圖；點建築 / 島嶼進入；⬆⬇←→ 走 chibi</div>
            </div>

            <!-- 觸控搖桿（獨立於 viewport 拖曳） -->
            <div class="wd-joystick" id="wd-joystick">
                <div class="wd-joystick-knob" id="wd-joystick-knob"></div>
            </div>

            <!-- Demo Modal（沿用 demo.css） -->
            <div id="demo-modal" class="demo-modal">
                <div class="demo-modal-card">
                    <div class="demo-modal-icon" id="demo-modal-icon">✨</div>
                    <div class="demo-modal-title" id="demo-modal-title">技術 Demo</div>
                    <div class="demo-modal-body" id="demo-modal-body"></div>
                    <button class="demo-modal-close" id="demo-modal-close">了解</button>
                </div>
            </div>

            <!-- ── 底部寵物欄（純擺飾） ──────── -->
            <div class="wd-bottom">
                <div class="wd-pet active">🐱</div>
                <div class="wd-pet">🐶</div>
                <div class="wd-pet">🐰</div>
                <div class="wd-pet">🦊</div>
                <div class="wd-pet">🐻</div>
            </div>

        </div>
    </div>
</div>

<script src="static/js/world.js?v=14"></script>
<script type="module" src="static/js/world-chibi.js?v=19"></script>

</body>
</html>
