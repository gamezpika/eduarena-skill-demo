<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1a6b9c">
    <!-- OG meta -->
    <meta property="og:title" content="探索地圖 — EduArena Demo">
    <meta property="og:description" content="EduArena 技術展示">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://eduarena-skill-demo-production.up.railway.app/assets/images/world_bg.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="description" content="EduArena 探索地圖技術 Demo — 大背景可上下滑動的探索感地圖。">
    <title>EduArena 探索地圖 Demo</title>
    <link rel="stylesheet" href="static/css/demo.css?v=3">
    <link rel="stylesheet" href="static/css/world.css?v=13">
</head>
<body>

<div class="demo-banner">技術 DEMO</div>

<div class="iphone-frame">
    <div class="iphone-island" aria-hidden="true"></div>
    <div class="iphone-home" aria-hidden="true"></div>

    <div class="iphone-screen">
        <div id="screen-world">

            <!-- ── 上：場景名 + 任務進度 ──────── -->
            <div class="wd-top">
                <div class="wd-scene">
                    <div class="wd-scene-name">起 始 之 地</div>
                    <div class="wd-scene-progress">已開採 0 / 1</div>
                </div>
            </div>

            <!-- ── 左側：玩家頭像 + 狀態 ────── -->
            <div class="wd-left">
                <div class="wd-player-card">
                    <div class="wd-avatar">🧙</div>
                    <div>
                        <div class="wd-player-name">派派 Lv 42</div>
                        <div class="wd-player-bar"><i></i></div>
                    </div>
                </div>
                <div class="wd-status-card">
                    <div class="wd-status-label">工作排程</div>
                    <div class="wd-status-value">休息中…</div>
                </div>
            </div>

            <!-- ── 右上：資源欄 ─────────────── -->
            <div class="wd-right">
                <div class="wd-res">
                    <span class="wd-res-icon coin">🍯</span>
                    <span>1.5M</span>
                </div>
                <div class="wd-res">
                    <span class="wd-res-icon gem">💎</span>
                    <span>238</span>
                </div>
            </div>

            <!-- ── 主場景：大背景可上下滑動 + sprite hotspot ──── -->
            <div class="wd-viewport" id="wd-viewport">
                <div class="wd-world" id="wd-world">
                    <!-- 5 個建築 + 5 科目島散佈在背景平台上 -->
                    <button class="wd-sprite" data-tap="shop" style="top:8%;left:14%;width:18%;">
                        <span class="wd-shadow"></span>
                        <img src="assets/images/village/village_shop.png" alt="商店">
                        <!-- 商店動畫：chibi 顧客走來走去 -->
                        <span class="wd-anim" aria-hidden="true">
                            <img class="wd-walker walker-shop" src="assets/images/world/shopper.png" alt="">
                            <span class="wd-sparkle wd-sparkle-shop">✨</span>
                        </span>
                        <span class="wd-label">商店</span>
                    </button>
                    <button class="wd-sprite" data-tap="exam" style="top:11%;left:62%;width:18%;">
                        <span class="wd-shadow"></span>
                        <img src="assets/images/world/academy.png" alt="考試中心">
                        <!-- 考試中心動畫：chibi 學者站門口 + 星星閃光 -->
                        <span class="wd-anim" aria-hidden="true">
                            <img class="wd-walker walker-exam" src="assets/images/world/scholar.png" alt="">
                            <span class="wd-sparkle sp1">✨</span>
                            <span class="wd-sparkle sp2">⭐</span>
                        </span>
                        <span class="wd-label">考試中心</span>
                    </button>
                    <button class="wd-sprite" data-tap="farm" style="top:28%;left:40%;width:18%;">
                        <span class="wd-shadow"></span>
                        <img src="assets/images/village/village_farm.png" alt="農田">
                        <!-- 農田動畫：chibi 牛/雞走 + 麥草搖 -->
                        <span class="wd-anim" aria-hidden="true">
                            <img class="wd-pet pet-cow" src="assets/images/world/cow.png" alt="">
                            <img class="wd-pet pet-chick" src="assets/images/world/chick.png" alt="">
                            <img class="wd-plant" src="assets/images/world/wheat.png" alt="">
                        </span>
                        <span class="wd-label">農田</span>
                    </button>
                    <button class="wd-sprite" data-tap="cottage" style="top:42%;left:12%;width:17%;">
                        <span class="wd-shadow"></span>
                        <img src="assets/images/world/cottage.png" alt="個人小屋">
                        <!-- 小屋動畫：煙囪冒煙 -->
                        <span class="wd-anim" aria-hidden="true">
                            <span class="wd-smoke s1"></span>
                            <span class="wd-smoke s2"></span>
                            <span class="wd-smoke s3"></span>
                        </span>
                        <span class="wd-label">個人小屋</span>
                    </button>

                    <!-- 5 科目島散佈在右半 / 海上 -->
                    <!-- ── 自由走動 NPC（散步在地圖上，純擺飾不可點） ── -->
                    <div class="wd-freeroam fr-cow"     style="top:18%;"><div class="wd-freeroam-inner"><img src="assets/images/world/cow.png" alt=""></div></div>
                    <div class="wd-freeroam fr-chick"   style="top:34%;"><div class="wd-freeroam-inner"><img src="assets/images/world/chick.png" alt=""></div></div>
                    <div class="wd-freeroam fr-shopper" style="top:38%;"><div class="wd-freeroam-inner"><img src="assets/images/world/shopper.png" alt=""></div></div>
                    <div class="wd-freeroam fr-scholar" style="top:60%;"><div class="wd-freeroam-inner"><img src="assets/images/world/scholar.png" alt=""></div></div>
                    <div class="wd-freeroam fr-chick2"  style="top:50%;"><div class="wd-freeroam-inner"><img src="assets/images/world/chick.png" alt=""></div></div>

                    <!-- 5 科目島：含水波漣漪動畫 -->
                    <button class="wd-sprite wd-island" data-tap="chinese" style="top:50%;left:64%;width:16%;">
                        <span class="wd-shadow"></span>
                        <img src="assets/images/island_chinese.png" alt="國語島">
                        <span class="wd-anim" aria-hidden="true"><span class="wd-ripple r1"></span><span class="wd-ripple r2"></span></span>
                        <span class="wd-label">國語島</span>
                    </button>
                    <button class="wd-sprite wd-island" data-tap="english" style="top:64%;left:38%;width:16%;">
                        <span class="wd-shadow"></span>
                        <img src="assets/images/island_english.png" alt="英文島">
                        <span class="wd-anim" aria-hidden="true"><span class="wd-ripple r1"></span><span class="wd-ripple r2"></span></span>
                        <span class="wd-label">英文島</span>
                    </button>
                    <button class="wd-sprite wd-island" data-tap="math" style="top:68%;left:68%;width:16%;">
                        <span class="wd-shadow"></span>
                        <img src="assets/images/island_math.png" alt="數學島">
                        <span class="wd-anim" aria-hidden="true"><span class="wd-ripple r1"></span><span class="wd-ripple r2"></span></span>
                        <span class="wd-label">數學島</span>
                    </button>
                    <button class="wd-sprite wd-island" data-tap="science" style="top:82%;left:18%;width:16%;">
                        <span class="wd-shadow"></span>
                        <img src="assets/images/island_science.png" alt="自然島">
                        <span class="wd-anim" aria-hidden="true"><span class="wd-ripple r1"></span><span class="wd-ripple r2"></span></span>
                        <span class="wd-label">自然島</span>
                    </button>
                    <button class="wd-sprite wd-island" data-tap="social" style="top:86%;left:52%;width:16%;">
                        <span class="wd-shadow"></span>
                        <img src="assets/images/island_social.png" alt="社會島">
                        <span class="wd-anim" aria-hidden="true"><span class="wd-ripple r1"></span><span class="wd-ripple r2"></span></span>
                        <span class="wd-label">社會島</span>
                    </button>
                </div>
                <!-- 晝夜變化 overlay（60 秒一循環：晨→日→晚→夜） -->
                <div class="wd-daynight" aria-hidden="true"></div>

                <!-- 飄雲（前景，跨頂部緩慢飄過） -->
                <div class="wd-clouds" aria-hidden="true">
                    <span class="wd-cloud c1">☁️</span>
                    <span class="wd-cloud c2">☁️</span>
                    <span class="wd-cloud c3">⛅</span>
                </div>

                <!-- 玩家頭像（固定在 viewport 中央偏下，永遠是「世界中心」） -->
                <div class="wd-player" id="wd-player" aria-hidden="true">
                    <span class="wd-player-emoji">🧙</span>
                    <span class="wd-player-shadow"></span>
                </div>

                <!-- Mini Map（右上角小地圖） -->
                <div class="wd-minimap" aria-hidden="true">
                    <span class="wd-mm-label">🗺</span>
                    <span class="wd-mm-dot" style="top:8%;left:23%"></span>
                    <span class="wd-mm-dot" style="top:11%;left:71%"></span>
                    <span class="wd-mm-dot" style="top:28%;left:49%"></span>
                    <span class="wd-mm-dot" style="top:42%;left:20%"></span>
                    <span class="wd-mm-dot wd-mm-island" style="top:50%;left:72%"></span>
                    <span class="wd-mm-dot wd-mm-island" style="top:64%;left:46%"></span>
                    <span class="wd-mm-dot wd-mm-island" style="top:68%;left:76%"></span>
                    <span class="wd-mm-dot wd-mm-island" style="top:82%;left:26%"></span>
                    <span class="wd-mm-dot wd-mm-island" style="top:86%;left:60%"></span>
                    <span class="wd-mm-you" id="wd-mm-you"></span>
                </div>

                <div class="wd-hint">↕ ↔ 拖曳地圖；點建築 / 島嶼進入</div>
            </div>

            <!-- Demo Modal（沿用 demo.css） -->
            <div id="demo-modal" class="demo-modal">
                <div class="demo-modal-card">
                    <div class="demo-modal-icon" id="demo-modal-icon">✨</div>
                    <div class="demo-modal-title" id="demo-modal-title">技術 Demo</div>
                    <div class="demo-modal-body" id="demo-modal-body"></div>
                    <button class="demo-modal-close" id="demo-modal-close">了解</button>
                </div>
            </div>

            <!-- ── 底部寵物欄（純擺飾） ──────── -->
            <div class="wd-bottom">
                <div class="wd-pet active">🐱</div>
                <div class="wd-pet">🐶</div>
                <div class="wd-pet">🐰</div>
                <div class="wd-pet">🦊</div>
                <div class="wd-pet">🐻</div>
            </div>

        </div>
    </div>
</div>

<script src="static/js/world.js?v=8"></script>

</body>
</html>
