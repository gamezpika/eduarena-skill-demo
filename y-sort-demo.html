<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Y-Sort 場景示範 — 小智學園</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overscroll-behavior: none; }
body {
    background: #1a0a2e;
    color: #fff;
    font-family: "Noto Sans CJK TC", "PingFang TC", system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
}
.header {
    padding: 14px 20px 8px;
    text-align: center;
}
.header h1 {
    font-size: 18px;
    color: #ffd86b;
    margin-bottom: 4px;
}
.header p {
    font-size: 12px;
    color: rgba(255,255,255,0.65);
    line-height: 1.5;
}
#game-container {
    width: min(96vw, 800px);
    aspect-ratio: 4 / 3;
    max-height: 70vh;
    background: #0a0518;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 8px 30px rgba(0,0,0,0.5);
    position: relative;
}
.controls {
    margin-top: 12px;
    padding: 0 20px;
    font-size: 13px;
    color: rgba(255,255,255,0.75);
    text-align: center;
    line-height: 1.6;
}
.controls strong { color: #ffd86b; }
.controls .hint {
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    margin-top: 4px;
}
/* 觸控搖桿（手機顯示） */
.touch-pad {
    display: none;
    position: fixed;
    bottom: 30px;
    left: 30px;
    width: 110px;
    height: 110px;
    background: rgba(255,255,255,0.08);
    border: 2px solid rgba(255,255,255,0.25);
    border-radius: 50%;
    touch-action: none;
    z-index: 100;
}
.touch-pad-stick {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 46px; height: 46px;
    background: rgba(255,216,107,0.5);
    border-radius: 50%;
    pointer-events: none;
    transition: background 0.1s;
}
.touch-pad.active .touch-pad-stick {
    background: rgba(255,216,107,0.85);
}
@media (hover: none) and (pointer: coarse) {
    .touch-pad { display: block; }
    .desktop-only { display: none; }
}
.back-btn {
    position: fixed;
    top: 12px;
    left: 12px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 12px;
    text-decoration: none;
    font-family: inherit;
    z-index: 200;
}
.back-btn:hover { background: rgba(255,255,255,0.18); }
</style>
</head>
<body>
<a href="index.html" class="back-btn">← 返回</a>

<div class="header">
    <h1>🌳 Y-Sort 場景示範</h1>
    <p>角色 Y 座標決定遮擋順序<br>走到樹後面會被擋、走到前面會擋住樹</p>
</div>

<div id="game-container"></div>

<div class="controls">
    <span class="desktop-only"><strong>WASD</strong> 或 <strong>方向鍵</strong> 移動角色</span>
    <span style="display:none" id="touch-hint">觸控左下搖桿移動</span>
    <div class="hint">繞著樹走一圈，觀察遮擋的瞬間切換</div>
</div>

<div class="touch-pad" id="touch-pad">
    <div class="touch-pad-stick" id="touch-stick"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
<script>
(function(){
"use strict";

const W = 800, H = 600;

class MainScene extends Phaser.Scene {
    constructor() { super('main'); }

    preload() {
        this.load.image('hero', 'assets/images/arena/hero_iso.png');
    }

    create() {
        // === 草地背景 + isometric grid hint ===
        const g = this.add.graphics();
        g.fillStyle(0x4a7c2a, 1);
        g.fillRect(0, 0, W, H);
        // 漸層光照感（上暗下亮）
        for (let i = 0; i < H; i += 4) {
            const a = (i / H) * 0.15;
            g.fillStyle(0xffffff, a);
            g.fillRect(0, i, W, 4);
        }
        // grid lines
        g.lineStyle(1, 0x3a6020, 0.4);
        for (let x = 0; x < W; x += 80) g.lineBetween(x, 0, x, H);
        for (let y = 0; y < H; y += 60) g.lineBetween(0, y, W, y);
        g.setDepth(-1000);

        // === 樹（emoji + 影子，Y-Sort 用）===
        this.objects = [];
        const treeData = [
            { x: 150, y: 200, emoji: '🌳', size: 70 },
            { x: 450, y: 270, emoji: '🌳', size: 80 },
            { x: 290, y: 380, emoji: '🌲', size: 75 },
            { x: 620, y: 430, emoji: '🌳', size: 90 },
            { x: 180, y: 480, emoji: '🌲', size: 70 },
            { x: 530, y: 150, emoji: '🪨', size: 50 },
            { x: 380, y: 520, emoji: '🪨', size: 45 },
        ];
        treeData.forEach(d => {
            // 影子（永遠在最底層，跟物件本身解耦）
            const sh = this.add.ellipse(d.x, d.y + 6, d.size * 0.85, d.size * 0.22, 0x000000, 0.35);
            sh.setDepth(-500);
            // 物件 emoji，錨點在腳底
            const obj = this.add.text(d.x, d.y, d.emoji, {
                fontSize: d.size + 'px',
            }).setOrigin(0.5, 1);
            obj.setDepth(d.y);  // **核心：depth = y**
            this.objects.push(obj);
        });

        // === 主角 ===
        this.player = this.add.image(W/2, H/2, 'hero')
            .setOrigin(0.5, 0.95)  // 錨點在腳底（hero_iso 主體在中下）
            .setScale(0.18);
        this.player.setDepth(this.player.y);

        // 主角影子
        this.playerShadow = this.add.ellipse(this.player.x, this.player.y, 60, 16, 0x000000, 0.4);
        this.playerShadow.setDepth(-500);

        // === 鍵盤 ===
        this.cursors = this.input.keyboard.createCursorKeys();
        this.keys = this.input.keyboard.addKeys('W,A,S,D');

        // === 觸控 ===
        this.touchVec = { x: 0, y: 0 };
        const cleanupTouch = setupTouchControls((vec) => { this.touchVec = vec; });
        // scene 結束時清掉 DOM listener，避免累積（Codex P1）
        this.events.once(Phaser.Scenes.Events.SHUTDOWN, cleanupTouch);
        this.events.once(Phaser.Scenes.Events.DESTROY, cleanupTouch);

        // === Debug 顯示 Y 座標 + 遮擋狀態 ===
        this.debugText = this.add.text(8, 8, '', {
            fontSize: '11px',
            color: '#ffd86b',
            backgroundColor: '#000000aa',
            padding: { x: 6, y: 3 },
            fontFamily: 'monospace',
        });
        this.debugText.setScrollFactor(0).setDepth(99999);

        // === 提示文字（過 3 秒後淡出）===
        const tip = this.add.text(W/2, 40, '試著繞到樹後面看看', {
            fontSize: '14px',
            color: '#ffffff',
            backgroundColor: 'rgba(0,0,0,0.5)',
            padding: { x: 10, y: 5 },
        }).setOrigin(0.5).setDepth(99999);
        this.tweens.add({
            targets: tip,
            alpha: 0,
            duration: 800,
            delay: 3000,
            onComplete: () => tip.destroy(),
        });
    }

    update() {
        const speed = 3.2;
        let dx = 0, dy = 0;
        if (this.cursors.left.isDown || this.keys.A.isDown) dx -= 1;
        if (this.cursors.right.isDown || this.keys.D.isDown) dx += 1;
        if (this.cursors.up.isDown || this.keys.W.isDown) dy -= 1;
        if (this.cursors.down.isDown || this.keys.S.isDown) dy += 1;
        // 觸控搖桿
        dx += this.touchVec.x;
        dy += this.touchVec.y;
        const mag = Math.hypot(dx, dy);
        if (mag > 0.01) {
            const ux = dx / Math.max(mag, 1);
            const uy = dy / Math.max(mag, 1);
            this.player.x += ux * speed;
            this.player.y += uy * speed;
            this.player.x = Phaser.Math.Clamp(this.player.x, 40, W - 40);
            this.player.y = Phaser.Math.Clamp(this.player.y, 90, H - 20);
        }

        // 同步影子
        this.playerShadow.x = this.player.x;
        this.playerShadow.y = this.player.y + 4;

        // **Y-Sort 核心：每禎更新 player depth = player.y**
        this.player.setDepth(this.player.y);

        // Debug：列出 player 跟每棵樹的 Y + 誰被擋
        const playerY = Math.round(this.player.y);
        const treesInfo = this.objects.map(o => {
            const oy = Math.round(o.y);
            const front = playerY > oy ? '⬆' : '⬇';
            return `${front}${oy}`;
        }).join(' ');
        this.debugText.setText(`角色 Y: ${playerY}\n樹/石 Y: ${treesInfo}\n⬆=角色擋它  ⬇=它擋角色`);
    }
}

// ─── 觸控搖桿邏輯 ───
// Codex P1：追蹤 touch identifier，避免多點觸控跟錯手指
function setupTouchControls(onMove) {
    const pad = document.getElementById('touch-pad');
    const stick = document.getElementById('touch-stick');
    const hint = document.getElementById('touch-hint');
    if (!pad) return () => {};  // 無 pad 也回 noop cleanup
    if (hint) hint.style.display = 'inline';
    let center = null;
    let activeId = null;  // 當前追蹤的觸控 identifier
    const maxR = 45;
    const updateStick = (sx, sy) => {
        stick.style.transform = `translate(calc(-50% + ${sx}px), calc(-50% + ${sy}px))`;
    };
    const findTouch = (touchList) => {
        for (let i = 0; i < touchList.length; i++) {
            if (touchList[i].identifier === activeId) return touchList[i];
        }
        return null;
    };
    const reset = () => {
        pad.classList.remove('active');
        updateStick(0, 0);
        onMove({ x: 0, y: 0 });
        center = null;
        activeId = null;
    };
    const onStart = (e) => {
        e.preventDefault();
        if (activeId !== null) return;  // 已有追蹤中的手指，忽略額外的
        const t = e.changedTouches[0];
        activeId = t.identifier;
        pad.classList.add('active');
        const rect = pad.getBoundingClientRect();
        center = { x: rect.left + rect.width/2, y: rect.top + rect.height/2 };
    };
    const onMoveEvt = (e) => {
        e.preventDefault();
        if (!center || activeId === null) return;
        const t = findTouch(e.changedTouches) || findTouch(e.touches);
        if (!t) return;
        let dx = t.clientX - center.x;
        let dy = t.clientY - center.y;
        const mag = Math.hypot(dx, dy);
        if (mag > maxR) {
            dx = (dx / mag) * maxR;
            dy = (dy / mag) * maxR;
        }
        updateStick(dx, dy);
        onMove({ x: dx / maxR, y: dy / maxR });
    };
    const onEnd = (e) => {
        e.preventDefault();
        // 只在追蹤中的手指離開時才重置
        if (findTouch(e.changedTouches)) reset();
    };
    pad.addEventListener('touchstart', onStart, { passive: false });
    pad.addEventListener('touchmove', onMoveEvt, { passive: false });
    pad.addEventListener('touchend', onEnd, { passive: false });
    pad.addEventListener('touchcancel', onEnd, { passive: false });
    // 回 cleanup 函式（Codex P1）
    return () => {
        pad.removeEventListener('touchstart', onStart);
        pad.removeEventListener('touchmove', onMoveEvt);
        pad.removeEventListener('touchend', onEnd);
        pad.removeEventListener('touchcancel', onEnd);
        reset();
    };
}

// ─── 啟動 ───
new Phaser.Game({
    type: Phaser.AUTO,
    width: W,
    height: H,
    parent: 'game-container',
    scene: MainScene,
    scale: {
        mode: Phaser.Scale.FIT,
        autoCenter: Phaser.Scale.CENTER_BOTH,
    },
    backgroundColor: '#0a0518',
    pixelArt: false,
    physics: {
        default: 'arcade',
    },
});

})();
</script>
</body>
</html>
